         auf dem iPhone echte Werte liefert. Ohne das war jeder Schutzabstand

         der Home-Indikator-/Siri-Zone. Kopf- und Fußbereich fangen die Insets
         in AppShell.tsx ab. -->

      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
